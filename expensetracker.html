<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bonuri</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c8f04a;
    --accent2: #4af0c8;
    --text: #e8e8e8;
    --muted: #666;
    --danger: #f04a4a;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 20px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  header span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
    margin-bottom: 16px;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #1e2010; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-zone p { font-size: 14px; color: var(--muted); }
  .upload-zone strong { color: var(--accent); font-size: 15px; display: block; margin-bottom: 6px; }

  /* Previews */
  .previews {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .preview-thumb {
    position: relative;
    width: 72px; height: 72px;
    border-radius: 8px;
    overflow: hidden;
    border: 1.5px solid var(--border);
  }
  .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .preview-thumb button {
    position: absolute; top: 2px; right: 2px;
    background: rgba(0,0,0,0.7); color: #fff;
    border: none; border-radius: 50%;
    width: 18px; height: 18px; font-size: 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* Buttons */
  .btn {
    width: 100%; padding: 14px;
    border: none; border-radius: 10px;
    font-family: var(--mono); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-primary {
    background: var(--accent); color: #0f0f0f;
  }
  .btn-primary:hover { background: #d4f55a; transform: translateY(-1px); }
  .btn-primary:disabled { background: #333; color: var(--muted); cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); margin-top: 8px;
  }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-danger {
    background: transparent; color: var(--danger);
    border: 1px solid var(--danger); margin-top: 8px;
    font-size: 12px; padding: 8px;
  }

  /* Status */
  .status {
    text-align: center; padding: 14px;
    font-family: var(--mono); font-size: 12px;
    color: var(--muted); background: var(--surface);
    border-radius: 8px; margin: 12px 0;
    border: 1px solid var(--border);
  }
  .status.loading { color: var(--accent); border-color: var(--accent); }
  .status.error { color: var(--danger); border-color: var(--danger); }
  .status.success { color: var(--accent2); border-color: var(--accent2); }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin: 16px 0;
  }
  .table-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .table-header span {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
  }
  .table-header strong { font-size: 14px; color: var(--accent2); }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px;
    padding: 8px 10px; text-align: left;
    background: #111; border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #1e1e1e; }
  tbody td {
    padding: 8px 10px; font-size: 12px; vertical-align: middle;
  }
  td.luna { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
  td.cat {
    font-size: 10px; font-family: var(--mono);
    background: #222; color: var(--accent2);
    border-radius: 4px; padding: 3px 6px; white-space: nowrap;
    display: inline-block; margin: 2px 0;
  }
  td.produs { color: var(--text); }
  td.pret { font-family: var(--mono); font-size: 12px; color: var(--accent); text-align: right; white-space: nowrap; }
  td input {
    background: transparent; border: none; color: inherit;
    font: inherit; width: 100%; outline: none;
  }
  td input:focus { background: #222; border-radius: 4px; padding: 2px 4px; }

  /* History */
  .section-title {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin: 24px 0 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .history-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    margin-bottom: 8px; cursor: pointer; transition: all 0.15s;
    display: flex; justify-content: space-between; align-items: center;
  }
  .history-item:hover { border-color: var(--accent2); }
  .history-item .hi-left { flex: 1; }
  .history-item .hi-date { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .history-item .hi-name { font-size: 13px; margin: 2px 0; }
  .history-item .hi-rows { font-size: 11px; color: var(--muted); }
  .history-item .hi-total { font-family: var(--mono); font-size: 14px; color: var(--accent); font-weight: 600; }
  .history-item .hi-actions { display: flex; gap: 6px; margin-left: 10px; }
  .hi-btn {
    padding: 4px 8px; border-radius: 6px; font-size: 11px;
    cursor: pointer; border: 1px solid var(--border);
    background: transparent; font-family: var(--mono);
    transition: all 0.1s;
  }
  .hi-btn.dl { color: var(--accent2); border-color: var(--accent2); }
  .hi-btn.dl:hover { background: var(--accent2); color: #000; }
  .hi-btn.rm { color: var(--danger); border-color: var(--danger); }
  .hi-btn.rm:hover { background: var(--danger); color: #fff; }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid #333; border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 30px 20px; color: var(--muted); font-size: 13px; }
  .empty span { display: block; font-size: 28px; margin-bottom: 8px; }

  .api-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-bottom: 16px;
  }
  .api-section label { font-size: 11px; color: var(--muted); font-family: var(--mono); display: block; margin-bottom: 6px; }
  .api-section input {
    width: 100%; background: #111; border: 1px solid var(--border);
    color: var(--text); padding: 9px 12px; border-radius: 7px;
    font-family: var(--mono); font-size: 12px; outline: none;
  }
  .api-section input:focus { border-color: var(--accent); }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab {
    flex: 1; padding: 9px; border-radius: 8px; font-family: var(--mono);
    font-size: 12px; cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--muted); transition: all 0.15s; text-align: center;
  }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
</style>
</head>
<body>

<header>
  <h1>// bonuri</h1>
  <span>receipt parser v1.0</span>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('parse')">📷 Parsează</button>
  <button class="tab" onclick="switchTab('history')">📋 Istoric</button>
</div>

<!-- PARSE TAB -->
<div id="tab-parse">
  <div class="api-section">
    <label>ANTHROPIC API KEY</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="saveApiKey(this.value)">
  </div>

  <div class="upload-zone" id="dropzone">
    <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
    <div class="upload-icon">📄</div>
    <strong>Adaugă fotografii bonuri</strong>
    <p>Apasă sau trage imaginile aici</p>
  </div>

  <div class="previews" id="previews"></div>

  <button class="btn btn-primary" id="parseBtn" onclick="parseReceipts()" disabled>
    Parsează bonurile
  </button>

  <div id="status" style="display:none"></div>

  <div id="result" style="display:none">
    <div class="table-wrap">
      <div class="table-header">
        <strong id="resultTitle">Rezultat</strong>
        <span id="resultCount"></span>
      </div>
      <div style="overflow-x:auto">
        <table id="dataTable">
          <thead>
            <tr>
              <th>Luna</th>
              <th>Categorie</th>
              <th>Produs</th>
              <th style="text-align:right">Pret</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <button class="btn btn-primary" onclick="downloadExcel()">⬇ Descarcă Excel</button>
    <button class="btn btn-secondary" onclick="saveToHistory()">💾 Salvează în istoric</button>
    <button class="btn btn-secondary" onclick="resetParse()">🔄 Parsează altele</button>
  </div>
</div>

<!-- HISTORY TAB -->
<div id="tab-history" style="display:none">
  <div id="historyList"></div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
let files = [];
let parsedData = [];
let db;

// ─── DB ──────────────────────────────────────────────────
function initDB() {
  const req = indexedDB.open('bonuri_db', 1);
  req.onupgradeneeded = e => {
    const d = e.target.result;
    if (!d.objectStoreNames.contains('receipts')) {
      d.createObjectStore('receipts', { keyPath: 'id', autoIncrement: true });
    }
  };
  req.onsuccess = e => { db = e.target.result; loadHistory(); };
  req.onerror = () => console.warn('IndexedDB failed');
}

function dbSave(data) {
  return new Promise((res, rej) => {
    const tx = db.transaction('receipts', 'readwrite');
    tx.objectStore('receipts').add(data).onsuccess = e => res(e.target.result);
    tx.onerror = rej;
  });
}

function dbGetAll() {
  return new Promise((res, rej) => {
    const tx = db.transaction('receipts', 'readonly');
    tx.objectStore('receipts').getAll().onsuccess = e => res(e.target.result);
    tx.onerror = rej;
  });
}

function dbDelete(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction('receipts', 'readwrite');
    tx.objectStore('receipts').delete(id).onsuccess = res;
    tx.onerror = rej;
  });
}

// ─── API Key ─────────────────────────────────────────────
function saveApiKey(v) { localStorage.setItem('api_key', v); }
function loadApiKey() {
  const k = localStorage.getItem('api_key') || '';
  document.getElementById('apiKey').value = k;
}

// ─── Files ───────────────────────────────────────────────
function handleFiles(newFiles) {
  for (const f of newFiles) {
    if (!files.find(x => x.name === f.name && x.size === f.size)) files.push(f);
  }
  renderPreviews();
  document.getElementById('parseBtn').disabled = files.length === 0;
}

function renderPreviews() {
  const c = document.getElementById('previews');
  c.innerHTML = '';
  files.forEach((f, i) => {
    const url = URL.createObjectURL(f);
    c.innerHTML += `<div class="preview-thumb">
      <img src="${url}">
      <button onclick="removeFile(${i})">✕</button>
    </div>`;
  });
}

function removeFile(i) {
  files.splice(i, 1);
  renderPreviews();
  document.getElementById('parseBtn').disabled = files.length === 0;
}

// Drag & drop
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); handleFiles(e.dataTransfer.files); });

// ─── Parse ───────────────────────────────────────────────
async function fileToBase64(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.readAsDataURL(file);
  });
}

async function parseReceipts() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showStatus('Introdu API key-ul Anthropic!', 'error'); return; }
  if (!files.length) return;

  const btn = document.getElementById('parseBtn');
  btn.disabled = true;
  showStatus('<span class="spinner"></span>Se parsează bonurile...', 'loading');

  try {
    const imageContents = await Promise.all(files.map(async f => ({
      type: 'image',
      source: { type: 'base64', media_type: f.type || 'image/jpeg', data: await fileToBase64(f) }
    })));

    const systemPrompt = `Ești un asistent care parsează bonuri fiscale din Moldova. 
Extrage TOATE produsele din bon și returnează DOAR un JSON valid, fără text adițional.

Format JSON:
{
  "items": [
    {"luna": "2026 03", "categorie": "Alimente", "produs": "Cartofi", "pret": 25.50}
  ]
}

REGULI STRICTE:
- "luna": format "YYYY MM" (ex: "2026 03"). Dacă data nu e vizibilă, lasă string gol "".
- "categorie": folosește DOAR aceste categorii: Alimente, Transport, Comunale, Medicina, Igiena, Curatenie, Binefacere, Altele, Familie, Arenda, Birotica, Electrocasnice, Imbracaminte, Casnice, Cadou, Taxe
- "produs": 1-2 cuvinte în română, generic, scurt. Exemple: Burger, Cartofi, Apa, Cascaval, Suc, Lavas, Fidea, Sarmale, Rosii
- "pret": prețul FINAL plătit (după reduceri), număr decimal
- Sacosa/punga → Altele, Sacosa
- Orice burger/sandwich cu pește sau carne → Alimente, Burger  
- Fanta/Pepsi/suc → Alimente, Suc
- Apă → Alimente, Apa
- Hârtie igienică → Igiena, Hirtie igienica
- Șervețele umede → Igiena, Servetele
- Castraveti/cornisoni → Alimente, Castraveti
- Tortilla/lavash → Alimente, Lavas
- Produse cosmetice/curățenie casă → Curatenie
- Medicamente/spray nazal → Medicina
- Dacă sunt mai multe bonuri în imagine, parsează-le pe toate.`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: systemPrompt,
        messages: [{
          role: 'user',
          content: [
            ...imageContents,
            { type: 'text', text: 'Parsează toate bonurile din aceste imagini și returnează JSON.' }
          ]
        }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || 'API error');
    }

    const data = await resp.json();
    const text = data.content.map(b => b.text || '').join('');
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Nu am primit JSON valid');

    const parsed = JSON.parse(jsonMatch[0]);
    parsedData = parsed.items || [];

    if (!parsedData.length) throw new Error('Niciun produs găsit');

    renderTable(parsedData);
    showStatus(`✓ ${parsedData.length} produse găsite`, 'success');
    document.getElementById('result').style.display = 'block';
    document.getElementById('resultCount').textContent = `${parsedData.length} rânduri`;

  } catch (e) {
    showStatus('Eroare: ' + e.message, 'error');
    btn.disabled = false;
  }
}

// ─── Table ───────────────────────────────────────────────
function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = data.map((row, i) => `
    <tr>
      <td class="luna"><input value="${row.luna || ''}" onchange="parsedData[${i}].luna=this.value"></td>
      <td><span class="cat">${row.categorie}</span></td>
      <td class="produs"><input value="${row.produs}" onchange="parsedData[${i}].produs=this.value"></td>
      <td class="pret"><input value="${row.pret}" onchange="parsedData[${i}].pret=parseFloat(this.value)||0" style="text-align:right"></td>
    </tr>
  `).join('');
}

// ─── Excel ───────────────────────────────────────────────
function downloadExcel() {
  const wb = XLSX.utils.book_new();
  const wsData = [
    ['Luna', 'Categorie', 'Produs', 'Pret (MDL)'],
    ...parsedData.map(r => [r.luna || '', r.categorie, r.produs, r.pret])
  ];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{ wch: 10 }, { wch: 14 }, { wch: 22 }, { wch: 12 }];
  XLSX.utils.book_append_sheet(wb, ws, 'Bonuri');
  const luna = parsedData[0]?.luna?.replace(' ', '_') || 'bon';
  XLSX.writeFile(wb, `bonuri_${luna}_${Date.now()}.xlsx`);
}

// ─── History ─────────────────────────────────────────────
async function saveToHistory() {
  if (!db || !parsedData.length) return;
  const total = parsedData.reduce((s, r) => s + (parseFloat(r.pret) || 0), 0);
  const luna = parsedData[0]?.luna || '—';
  const record = {
    date: new Date().toISOString(),
    luna,
    rows: parsedData.length,
    total: total.toFixed(2),
    data: parsedData
  };
  await dbSave(record);
  showStatus('✓ Salvat în istoric!', 'success');
  loadHistory();
}

async function loadHistory() {
  if (!db) return;
  const all = await dbGetAll();
  const c = document.getElementById('historyList');
  if (!all.length) {
    c.innerHTML = '<div class="empty"><span>📋</span>Niciun bon salvat încă</div>';
    return;
  }
  all.reverse();
  c.innerHTML = all.map(rec => `
    <div class="history-item">
      <div class="hi-left">
        <div class="hi-date">${new Date(rec.date).toLocaleDateString('ro-MD')}</div>
        <div class="hi-name">${rec.luna} · ${rec.rows} produse</div>
      </div>
      <div class="hi-total">${rec.total} lei</div>
      <div class="hi-actions">
        <button class="hi-btn dl" onclick="downloadHistoryItem(${rec.id})">XLS</button>
        <button class="hi-btn rm" onclick="deleteHistoryItem(${rec.id})">✕</button>
      </div>
    </div>
  `).join('');
  window._historyCache = all;
}

async function downloadHistoryItem(id) {
  const all = window._historyCache || [];
  const rec = all.find(r => r.id === id);
  if (!rec) return;
  parsedData = rec.data;
  downloadExcel();
}

async function deleteHistoryItem(id) {
  if (!confirm('Ștergi acest bon din istoric?')) return;
  await dbDelete(id);
  loadHistory();
}

// ─── UI helpers ──────────────────────────────────────────
function showStatus(msg, type = '') {
  const s = document.getElementById('status');
  s.innerHTML = msg;
  s.className = 'status ' + type;
  s.style.display = 'block';
}

function resetParse() {
  files = [];
  parsedData = [];
  renderPreviews();
  document.getElementById('result').style.display = 'none';
  document.getElementById('status').style.display = 'none';
  document.getElementById('parseBtn').disabled = true;
  document.getElementById('fileInput').value = '';
}

function switchTab(tab) {
  document.getElementById('tab-parse').style.display = tab === 'parse' ? 'block' : 'none';
  document.getElementById('tab-history').style.display = tab === 'history' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'parse') || (i === 1 && tab === 'history'));
  });
  if (tab === 'history') loadHistory();
}

// ─── Init ────────────────────────────────────────────────
initDB();
loadApiKey();
</script>
</body>
</html>
